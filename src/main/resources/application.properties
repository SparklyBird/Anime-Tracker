# =============================================
# Anime Tracker - Application Configuration
# =============================================

# Server
server.port=8080

# H2 File Database (persists to ./data/animedb.mv.db — safe, won't disappear)
spring.datasource.url=jdbc:h2:file:./data/animedb;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# H2 Console (access at http://localhost:8080/h2-console if needed)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Disable static resource caching (forces browser to always fetch fresh CSS/JS)
spring.web.resources.cache.period=0
spring.web.resources.chain.cache=false
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# Upload directory (relative to where you run the jar)
app.upload-dir=./uploads

# Optional: Anthropic API key for Russian title translation + synopsis summary
# Get yours free at: https://console.anthropic.com
# anthropic.api.key=sk-ant-...
anthropic.api.key=${ANTHROPIC_API_KEY:}
